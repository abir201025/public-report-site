        input, select, textarea {

            border: 1px solid #ccc; border-radius: 8px;
            box-sizing: border-box; font-size: 15px;
        }
        input[type="file"] { padding: 10px; background: #f8f9fa; cursor: pointer; }

        .submit-btn {

            font-weight: bold; cursor: pointer; font-size: 16px;

        .contact-box { padding: 20px; background: white; border: 1px solid #eee; border-radius: 10px; width: 220px; }
