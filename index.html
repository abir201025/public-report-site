<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল রিপোর্ট পোর্টাল</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* ব্যাকগ্রাউন্ডে একটি সুন্দর ইমেজ ব্যবহার করা হয়েছে */
            background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* কাঁচের মতো স্বচ্ছ বক্স ডিজাইন */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* ঝাপসা ইফেক্ট */
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* লোগো ডিজাইন */
        .logo {
            width: 80px;
            height: 80px;
            background: #764ba2;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        h2 { color: #2d3436; margin-bottom: 5px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 25px; }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1.5px solid #dfe6e9;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.8);
        }

        input:focus, textarea:focus {
            border-color: #764ba2;
            background: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">R</div> 
    
    <h2>পাবলিক রিপোর্ট পোর্টাল</h2>
    <p>আপনার অভিযোগ বা রিপোর্টটি সাবমিট করুন</p>
    
    <form action="https://formspree.io/f/YOUR_EMAIL_HERE" method="POST">
        <input type="text" name="Name" placeholder="আপনার নাম" required>
        <input type="email" name="Email" placeholder="আপনার ইমেইল" required>
        <textarea name="Message" placeholder="রিপোর্ট বিস্তারিত..." rows="4" required></textarea>
        
        <button type="submit">জমা দিন</button>
    </form>
</div>

</body>
</html>
