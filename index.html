<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিপোর্ট ওয়েব</title>
    <style>
        /* ১. বডি স্টাইল - একদম পরিষ্কার সাদা */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff !important;
            color: #333;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            scroll-behavior: smooth;
        }

        /* ২. টপ বার */
        .top-bar {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }

        /* ৩. ন্যাভিগেশন বার */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 15px 8%;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: bold; color: #333; text-decoration: none; }
        .logo span { color: #007bff; }
        .nav-links a { color: #555; text-decoration: none; margin-left: 20px; font-weight: 500; }

        /* ৪. মেইন সেকশন (যাতে কন্টেন্ট নিচে না হারায়) */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ৫. রিপোর্ট ফর্ম কার্ড */
        .report-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: 0 auto;
        }
        .report-card h2 { text-align: center; color: #007bff; margin-bottom: 20px; }

        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 8px;
            box-sizing: border-box; font-size: 15px;
        }

        .btn-submit {
            width: 100%; padding: 14px; background: #007bff;
            color: white; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* ৬. কন্টাক্ট সেকশন */
        .contact-section {
            background: #f9f9f9;
            padding: 60px 20px;
            text-align: center;
            margin-top: 50px;
        }
        .contact-grid {
            display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 30px;
        }
        .contact-item { padding: 20px; background: white; border: 1px solid #eee; border-radius: 10px; width: 250px; }

        footer { padding: 30px; text-align: center; color: #999; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-bar">রিপোর্ট ওয়েব</div>

    <nav class="navbar">
        <a href="#" class="logo">REPORT<span>WEB</span></a>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#report">Report</a>
            <a href="#contact">Contact Us</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <section id="report">
            <div class="report-card">
                <h2>রিপোর্ট সাবমিট করুন</h2>
                <form action="https://formspree.io/f/YOUR_EMAIL_HERE" method="POST">
                    <input type="text" name="Name" placeholder="আপনার নাম" required>
                    <input type="email" name="Email" placeholder="ইমেইল অ্যাড্রেস" required>
                    <textarea name="Message" rows="5" placeholder="এখানে বিস্তারিত লিখুন..." required></textarea>
                    <button type="submit" class="btn-submit">জমা দিন</button>
                </form>
            </div>
        </section>
    </div>

    <section class="contact-section" id="contact">
        <h2>Contact Us</h2>
        <div class="contact-grid">
            <div class="contact-item">
                <h3>📍 অবস্থান</h3>
                <p>ঢাকা, বাংলাদেশ</p>
            </div>
            <div class="contact-item">
                <h3>📧 ইমেইল</h3>
                <p>contact@reportweb.com</p>
            </div>
        </div>
    </section>

    <footer>
        © ২০২৬ রিপোর্ট ওয়েব | সর্বস্বত্ব সংরক্ষিত
    </footer>

</body>
</html>
